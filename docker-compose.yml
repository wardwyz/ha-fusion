services:
  nova-domus:
    container_name: nova-domus
    image: ghcr.io/amedello/nova-domus
    volumes:
      - /path/to/ha-fusion:/app/data
    network_mode: bridge
    ports:
      - 5050:5050
    environment:
      TZ: Europe/Stockholm
      HASS_URL: http://192.168.1.241:8123
    restart: always
