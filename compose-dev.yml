services:
  nova-domus:
    container_name: nova-domus
    build: .
    volumes:
      - ./data:/app/data
      # Uncomment and adjust to mount your custom photo directory:
      # - /path/to/your/photos:/path/to/your/photos
    network_mode: bridge
    ports:
      - 5050:5050
    environment:
      TZ: Asia/Shanghai
      HASS_URL: http://XXXXXX
      # Lock screen image slideshow config
      SCREEN_IMAGE_DIR: /app/data/screen-images
      # If using a custom path, mount it in volumes above, then set it here:
      # SCREEN_IMAGE_DIR: /path/to/your/photos
      SCREEN_IMAGE_EXTENSIONS: jpg,jpeg,png,webp
      SCREEN_INTERVAL: '30'
      # Custom lyrics API URL (optional, uses api.lrc.cx by default)
      # Use {artist} and {title} as placeholders
      SCREEN_LYRICS_API_URL: ''
    restart: always
