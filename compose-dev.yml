services:
  nova-domus:
    container_name: nova-domus
    build: .
    volumes:
      - ./data:/app/data
      # Mount your photo folder directly to the default image directory:
      # - /volume2/photo:/app/data/screen-images
    network_mode: bridge
    ports:
      - 5050:5050
    environment:
      TZ: Asia/Shanghai
      HASS_URL: http://XXXXXX
      # Lock screen image slideshow config
      # Leave SCREEN_IMAGE_DIR at default. Mount your photos to /app/data/screen-images in volumes above.
      # SCREEN_IMAGE_DIR: /app/data/screen-images
      SCREEN_IMAGE_EXTENSIONS: jpg,jpeg,png,webp
      SCREEN_INTERVAL: '30'
      # Custom lyrics API URL (optional, uses api.lrc.cx by default)
      # Use {artist} and {title} as placeholders
      SCREEN_LYRICS_API_URL: ''
    restart: always
